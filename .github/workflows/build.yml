name: Build postmarketOS kernel for Samsung Galaxy A12s

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            python3 \
            device-tree-compiler \
            cpio \
            wget

      - name: Clone mainline mt6763 kernel
        run: |
          git clone https://gitlab.com/mtk-mainline/mt6763/linux.git kernel-tree
          cd kernel-tree
          git checkout 9ea268cebfcd3e12fe677c83119ee24961624421

      - name: Apply Samsung Galaxy A12s DTS
        run: |
          cp kernel/dts/samsung-a12s.dts kernel-tree/arch/arm64/boot/dts/exynos/
          # Add samsung-a12s.dtb to the Makefile
          cd kernel-tree
          if ! grep -q "samsung-a12s.dtb" arch/arm64/boot/dts/exynos/Makefile; then
            sed -i '/exynos850-e850-96.dtb/a\\tsamsung-a12s.dtb' arch/arm64/boot/dts/exynos/Makefile
          fi

      - name: Apply defconfig and build
        run: |
          cd kernel-tree
          cp ../kernel/configs/samsung-a12s_defconfig .config
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) Image dtbs

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp kernel-tree/arch/arm64/boot/Image artifacts/Image
          cp kernel-tree/arch/arm64/boot/dts/exynos/samsung-a12s.dtb artifacts/samsung-a12s.dtb
          cp kernel-tree/.config artifacts/kernel.config

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-a12s
          path: artifacts/Image
          retention-days: 30

      - name: Upload DTB
        uses: actions/upload-artifact@v4
        with:
          name: dtb-a12s
          path: artifacts/samsung-a12s.dtb
          retention-days: 30

      - name: Upload kernel config
        uses: actions/upload-artifact@v4
        with:
          name: kernel-config
          path: artifacts/kernel.config
          retention-days: 30
