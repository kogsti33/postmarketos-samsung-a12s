name: Build postmarketOS for Samsung Galaxy A12s

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu bc bison flex libssl-dev libelf-dev python3 device-tree-compiler cpio wget

      - name: Clone mainline mt6763 kernel
        run: |
          git clone --depth=1 https://gitlab.com/mtk-mainline/mt6763/linux.git kernel-tree
          cd kernel-tree
          git fetch --depth=1 origin 9ea268cebfcd3e12fe677c83119ee24961624421
          git checkout 9ea268cebfcd3e12fe677c83119ee24961624421

      - name: Apply Samsung Galaxy A12s DTS and fix Makefile
        run: |
          cp kernel/dts/samsung-a12s.dts kernel-tree/arch/arm64/boot/dts/exynos/
          printf '# SPDX-License-Identifier: GPL-2.0\ndtb-$(CONFIG_ARCH_EXYNOS) += \\\n\texynos5433-tm2.dtb\t\t\\\n\texynos5433-tm2e.dtb\t\t\\\n\texynos7-espresso.dtb\t\t\\\n\texynos7885-jackpotlte.dtb\t\\\n\texynos850-e850-96.dtb\t\t\\\n\tsamsung-a12s.dtb\t\t\\\n\texynosautov9-sadk.dtb\n' > kernel-tree/arch/arm64/boot/dts/exynos/Makefile

      - name: Build kernel
        run: |
          cd kernel-tree
          cp ../kernel/configs/samsung-a12s_defconfig .config
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) Image dtbs

      - name: Create initramfs
        run: |
          mkdir -p initramfs/bin initramfs/sbin initramfs/etc initramfs/proc initramfs/sys initramfs/dev initramfs/tmp initramfs/usr/bin initramfs/usr/sbin initramfs/boot
          cp .github/scripts/init initramfs/init
          chmod +x initramfs/init
          cp kernel-tree/arch/arm64/boot/Image initramfs/boot/
          cp kernel-tree/arch/arm64/boot/dts/exynos/samsung-a12s.dtb initramfs/boot/
          printf '#!/bin/sh\nexec /bin/sh\n' > initramfs/bin/sh
          chmod +x initramfs/bin/sh
          cd initramfs
          find . -print0 | cpio --null -o -H newc 2>/dev/null | gzip > ../postmarketos.cpio.gz
          cd ..
          ls -lh postmarketos.cpio.gz

      - name: Create boot.img
        run: python3 .github/scripts/mkbootimg.py

      - name: Create flash package
        run: |
          mkdir -p flash-package
          cp boot.img flash-package/
          cp kernel-tree/arch/arm64/boot/dts/exynos/samsung-a12s.dtb flash-package/
          cp .github/scripts/init flash-package/init
          chmod +x flash-package/init

      - name: Create TWRP flashable zip
        run: |
          mkdir -p twrp-zip/META-INF/com/google/android
          cp .github/scripts/twrp-update-binary twrp-zip/META-INF/com/google/android/update-binary
          cp .github/scripts/twrp-updater-script twrp-zip/META-INF/com/google/android/updater-script
          cp boot.img twrp-zip/
          chmod +x twrp-zip/META-INF/com/google/android/update-binary
          cd twrp-zip
          zip -r ../postmarketos-a12s-kernel.zip .
          cd ..
          ls -lh postmarketos-a12s-kernel.zip

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-a12s
          path: kernel-tree/arch/arm64/boot/Image
          retention-days: 30

      - name: Upload DTB
        uses: actions/upload-artifact@v4
        with:
          name: dtb-a12s
          path: kernel-tree/arch/arm64/boot/dts/exynos/samsung-a12s.dtb
          retention-days: 30

      - name: Upload flash package
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-a12s-flash
          path: flash-package/
          retention-days: 30

      - name: Upload TWRP zip
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-a12s-kernel-zip
          path: postmarketos-a12s-kernel.zip
          retention-days: 30
